services:
  - type: web
    name: ecotrace-api
    env: node
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
    disk:
      name: ecotrace-db
      mountPath: /data
      sizeGB: 1
